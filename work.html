<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>小遊戲專案</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #7e97ac; /* 淡灰背景呼應你的網站 */
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        /* 左邊作品列表 */
        .work-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .work-list li {
            background-color: #fff; /* 白色卡片 */
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 5px solid #174a66; /* 跟你的網站按鈕色一致 */
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08); /* 輕微陰影 */
            transition: transform 0.2s, background-color 0.2s;
        }

        .work-list li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            display: block;
        }

        .work-list li:hover {
            background-color: #1e3853; /* hover 色呼應藍色 */
            transform: translateY(-2px); /* 浮起效果 */
        }

        /* 作品內容區 */
        .work-content h1 {
            margin-top: 0;
            color: #085483;
        }

        .work-content p {
            line-height: 1.6;
        }

        .work-content iframe {
            border: 1px solid #ccc;
            width: 100%;
            height: 400px;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #2d5970;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .back-link:hover {
            background-color: #7397b1;
        }
    </style>
</head>
