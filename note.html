<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>小遊戲專案</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #B4D1BD; /* 淡灰背景呼應你的網站 */
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        /* 左邊作品列表 */
        .work-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .work-list li {
            background-color: #fff; /* 白色卡片 */
            padding: 15px 20px;
            margin-bottom: 12px;
            border-left: 5px solid #80D9A4; /* 跟你的網站按鈕色一致 */
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08); /* 輕微陰影 */
            transition: transform 0.2s, background-color 0.2s;
        }

        .work-list li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            display: block;
        }

        .work-list li:hover {
            background-color: #2B4F34; /* hover 色呼應藍色 */
            transform: translateY(-2px); /* 浮起效果 */
        }

        /* 作品內容區 */
        .work-content h1 {
            margin-top: 0;
            color: #174b2c;
        }

        .work-content p {
            line-height: 1.6;
        }

        .work-content iframe {
            border: 1px solid #ccc;
            width: 100%;
            height: 400px;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #1f502a;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .back-link:hover {
            background-color: #2B4F34;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- 左邊作品列表（模擬 W3Schools exercise 風格） -->
        

        <!-- 作品內容 -->
        <div class="work-content">
            <h1>一些課堂筆記</h1>
            <p>這是我曾經練習 寫網頁 做的小作品</p>

            <!-- 如果有 demo 可以用 iframe -->
            <!-- <iframe src="game.html"></iframe> -->

            
        </div>
        <section class="box style1">
            <span class="icon featured fa-thumbs-up"></span>
            <h3>程式筆記</h3>
            <ul class="note-list">
                <li><a href="https://docs.google.com/document/d/1mxUuoAv1vuK6wkxWRWjC5_amB1ItykibzufnTyYwF_A/edit?usp=sharing" target="_blank">第一週</a></li>
                <li><a href="https://docs.google.com/document/d/11z1f761Pq7xqKuPrcRCOCNvMcZKZ7bUgP-NrHBckAow/edit?usp=sharing" target="_blank">第二週</a></li>
                <li><a href="https://docs.google.com/document/d/1PHg1ZKH7fbZjz9tjS3VrAAsg_elUgLyPHxbwkBFAxsU/edit?usp=sharing" target="_blank">第三週</a></li>
            </ul>
        </section>
        <a class="back-link" href="index.html">← 回首頁</a>
    </div>
</body>
</html>
